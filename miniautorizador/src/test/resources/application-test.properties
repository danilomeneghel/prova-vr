# Porta
server.port = 8081
# H2
# -Habilitar· o acesso ao console do banco de dados
spring.h2.console.enabled=true 
# -URL na qual o console ser· habilitado
spring.h2.console.path=/h2
# Datasource
# -URL de acesso ao banco
spring.datasource.url=jdbc:h2:mem:vr-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# -Usu·rio de acesso
spring.datasource.username=sa
# -Senha de acesso
spring.datasource.password=
# -Driver utilizado para conex„o
spring.datasource.driver-class-name=org.h2.Driver
# -Dialect ORM Hibernate utilizado
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect